name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Environment
        run: |
          pip install --upgrade pip
          pip install mkdocs-material

      - name: Set up Minimal Flatpak Infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      # Downloads and merges both architectural bundles from your v1.1.1 tags
      - name: Index Existing Multi-Arch Flatpak Packages
        run: |
          mkdir -p docs/nlc-repo
          ostree --repo=docs/nlc-repo init --mode=archive
          
          echo "=== Downloading Release Bundles ==="
          # Fetch your ARM64 package
          wget -q -O nlc_arm64.flatpak https://github.com
          
          # Fetch your AMD64/x86_64 package
          wget -q -O nlc_x86.flatpak https://github.com
          
          echo "=== Merging Assets to Store Index ==="
          if [ -f nlc_arm64.flatpak ] && [ -s nlc_arm64.flatpak ]; then
            echo "Indexing ARM64 architecture variant..."
            flatpak build-import-bundle docs/nlc-repo nlc_arm64.flatpak || true
          fi
          
          if [ -f nlc_x86.flatpak ] && [ -s nlc_x86.flatpak ]; then
            echo "Indexing x86_64 desktop architecture variant..."
            flatpak build-import-bundle docs/nlc-repo nlc_x86.flatpak || true
          fi
          
          flatpak build-update-repo docs/nlc-repo

      - name: Build Website and Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
