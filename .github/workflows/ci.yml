name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Environment
        run: |
          pip install --upgrade pip
          pip install mkdocs-material

      - name: Set up Minimal Flatpak Infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      # This version targets your exact filename casing scheme (NoLimitConnect.flatpak)
      - name: Index Existing Pre-Built Flatpak Package
        run: |
          mkdir -p docs/nlc-repo
          ostree --repo=docs/nlc-repo init --mode=archive
          
          # Downloads using your precise website case string or falls back cleanly
          wget --no-check-certificate -O nlc_app.flatpak https://nolimitconnect.org || wget --no-check-certificate -O nlc_app.flatpak https://nolimitconnect.org || true
          
          # Imports and updates your server store data if the asset is retrieved successfully
          if [ -f nlc_app.flatpak ]; then
            flatpak build-import-bundle docs/nlc-repo nlc_app.flatpak || true
          fi
          
          flatpak build-update-repo docs/nlc-repo

      # Pushes your website files and your flatpak repository to GitHub Pages together
      - name: Build Website and Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          mkdocs gh-deploy --force
