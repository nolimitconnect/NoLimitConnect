name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Environment
        run: |
          pip install --upgrade pip
          pip install mkdocs-material

      - name: Set up Minimal Flatpak Infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree jq gnupg

      - name: Index Latest Multi-Arch Flatpak Packages
        env:
          NLC_FLATPAK_GPG_PRIVATE_KEY_B64: ${{ secrets.NLC_FLATPAK_GPG_PRIVATE_KEY_B64 }}
          NLC_FLATPAK_GPG_KEY_ID: ${{ secrets.NLC_FLATPAK_GPG_KEY_ID }}
          NLC_FLATPAK_PUBLIC_KEY_B64: ${{ secrets.NLC_FLATPAK_PUBLIC_KEY_B64 }}
        run: |
          SIGN_FLATPAK_REPO=1
          if [ -z "${NLC_FLATPAK_GPG_PRIVATE_KEY_B64}" ] || [ -z "${NLC_FLATPAK_GPG_KEY_ID}" ]; then
            SIGN_FLATPAK_REPO=0
            echo "Warning: Flatpak signing secrets are not configured."
            echo "Proceeding with unsigned summary metadata for this Pages build."
          fi

          if [ "${SIGN_FLATPAK_REPO}" -eq 1 ]; then
            export GNUPGHOME=/tmp/nlc-flatpak-gnupg
            rm -rf "${GNUPGHOME}"
            mkdir -p "${GNUPGHOME}"
            chmod 700 "${GNUPGHOME}"

            echo "${NLC_FLATPAK_GPG_PRIVATE_KEY_B64}" | base64 --decode > /tmp/nlc-flatpak-private-key.asc
            gpg --batch --import /tmp/nlc-flatpak-private-key.asc
          fi

          rm -rf docs/nlc-repo
          mkdir -p docs/nlc-repo
          ostree --repo=docs/nlc-repo init --mode=archive

          echo "=== Fetching Dynamic Release Metadata ==="
          RELEASE_JSON=$(curl -fsSL "https://api.github.com/repos/nolimitconnect/NoLimitConnect/releases/latest")

          mkdir -p /tmp/nlc-flatpaks
          echo "$RELEASE_JSON" | jq -r '.assets[]? | select(.name | endswith(".flatpak")) | .browser_download_url' > /tmp/nlc-flatpaks/urls.txt

          echo "=== Importing Clean Bundles ==="
          if [ -s /tmp/nlc-flatpaks/urls.txt ]; then
            while IFS= read -r asset_url; do
              asset_name=$(basename "$asset_url")
              echo "Downloading $asset_name"
              curl -fL "$asset_url" -o "/tmp/nlc-flatpaks/$asset_name"
              ls -lh "/tmp/nlc-flatpaks/$asset_name"
              flatpak build-import-bundle docs/nlc-repo "/tmp/nlc-flatpaks/$asset_name"
            done < /tmp/nlc-flatpaks/urls.txt
          else
            echo "No .flatpak assets found in latest release."
            exit 1
          fi

          if [ "${SIGN_FLATPAK_REPO}" -eq 1 ]; then
            echo "=== Signing imported OSTree commits ==="
            while IFS= read -r app_ref; do
              [ -n "${app_ref}" ] || continue
              commit_id=$(ostree --repo=docs/nlc-repo rev-parse "${app_ref}")
              echo "Signing ${app_ref} @ ${commit_id}"
              ostree --repo=docs/nlc-repo --gpg-homedir="${GNUPGHOME}" gpg-sign "${commit_id}" "${NLC_FLATPAK_GPG_KEY_ID}"
            done < <(ostree --repo=docs/nlc-repo refs --list | grep '^app/' || true)

            flatpak build-update-repo \
              --gpg-sign="${NLC_FLATPAK_GPG_KEY_ID}" \
              --gpg-homedir="${GNUPGHOME}" \
              docs/nlc-repo

            if [ -n "${NLC_FLATPAK_PUBLIC_KEY_B64}" ]; then
              echo "${NLC_FLATPAK_PUBLIC_KEY_B64}" | base64 --decode > docs/nlc-flatpak-public.gpg
            else
              gpg --batch --yes --output docs/nlc-flatpak-public.gpg --export "${NLC_FLATPAK_GPG_KEY_ID}"
            fi
          else
            flatpak build-update-repo docs/nlc-repo
          fi

          echo "=== Repository refs ==="
          ostree --repo=docs/nlc-repo refs | tee /tmp/nlc-flatpaks/refs.txt

          APP_REFS=$(grep -c '^app/' /tmp/nlc-flatpaks/refs.txt || true)
          if [ "$APP_REFS" -eq 0 ]; then
            echo "No app refs were imported into docs/nlc-repo."
            exit 1
          fi

          EXPECTED_REFS=$(grep -c '^app/org\.nolimitconnect\.NoLimitConnect/' /tmp/nlc-flatpaks/refs.txt || true)
          if [ "$EXPECTED_REFS" -eq 0 ]; then
            echo "Expected org.nolimitconnect.NoLimitConnect refs were not found in docs/nlc-repo."
            exit 1
          fi

          if [ "${SIGN_FLATPAK_REPO}" -eq 1 ]; then
            echo "=== Verifying GPG signatures on app commits ==="
            while IFS= read -r app_ref; do
              [ -n "${app_ref}" ] || continue
              commit_id=$(ostree --repo=docs/nlc-repo rev-parse "${app_ref}")
              if ! ostree --repo=docs/nlc-repo --gpg-homedir="${GNUPGHOME}" show --gpg-verify "${commit_id}" >/dev/null; then
                echo "Missing or invalid GPG signature for ${app_ref} @ ${commit_id}"
                exit 1
              fi
            done < <(grep '^app/' /tmp/nlc-flatpaks/refs.txt || true)
          fi

          if [ ! -f docs/nlc-repo/summary ]; then
            echo "Flatpak summary file was not generated."
            exit 1
          fi

          if [ "${SIGN_FLATPAK_REPO}" -eq 1 ]; then
            if [ ! -f docs/nlc-repo/summary.sig ]; then
              echo "Flatpak summary signature file was not generated."
              exit 1
            fi

            if [ ! -f docs/nlc-flatpak-public.gpg ]; then
              echo "Flatpak public key file was not generated."
              exit 1
            fi
          fi

      - name: Build MkDocs Site
        run: |
          mkdocs build --clean --site-dir site

      - name: Preserve Flatpak Repository Files
        run: |
          mkdir -p site/nlc-repo
          rsync -a docs/nlc-repo/ site/nlc-repo/
          if [ -f docs/nlc-flatpak-public.gpg ]; then
            cp -f docs/nlc-flatpak-public.gpg site/nlc-flatpak-public.gpg
          fi
          touch site/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
