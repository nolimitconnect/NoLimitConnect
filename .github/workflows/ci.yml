name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Environment
        run: |
          pip install --upgrade pip
          pip install mkdocs-material

      - name: Set up Minimal Flatpak Infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree jq

      # Nukes old cache folders completely to resolve the invalid checksum errors
      - name: Index Latest Multi-Arch Flatpak Packages
        run: |
          rm -rf docs/nlc-repo
          mkdir -p docs/nlc-repo
          ostree --repo=docs/nlc-repo init --mode=archive
          
          echo "=== Fetching Dynamic Release Metadata ==="
          RELEASE_JSON=$(curl -s https://github.com)
          
          ARM64_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("arm64.flatpak")) | .browser_download_url' | head -n 1)
          X86_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "NoLimitConnect.flatpak") | .browser_download_url' | head -n 1)
          
          if [ ! -z "$ARM64_URL" ] && [ "$ARM64_URL" != "null" ]; then
            echo "Downloading ARM64 from: $ARM64_URL"
            wget -q -O nlc_arm64.flatpak "$ARM64_URL"
          fi
          
          if [ ! -z "$X86_URL" ] && [ "$X86_URL" != "null" ]; then
            echo "Downloading x86_64 from: $X86_URL"
            wget -q -O nlc_x86.flatpak "$X86_URL"
          fi
          
          echo "=== Importing Clean Bundles ==="
          if [ -f nlc_arm64.flatpak ] && [ -s nlc_arm64.flatpak ]; then
            flatpak build-import-bundle docs/nlc-repo nlc_arm64.flatpak || true
          fi
          
          if [ -f nlc_x86.flatpak ] && [ -s nlc_x86.flatpak ]; then
            flatpak build-import-bundle docs/nlc-repo nlc_x86.flatpak || true
          fi
          
          flatpak build-update-repo docs/nlc-repo

      - name: Build Website and Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
