id: org.nolimitconnect.NoLimitConnect

runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk

command: nolimitconnect

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11

  # Audio / Video
  - --socket=pulseaudio
  - --device=dri

  # Network & IPC
  - --share=network
  - --share=ipc

  # Files (user-controlled)
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos

cleanup:
  - '*.a'
  - '*.o'

modules:
    ########################
    # GLU 
    ########################
    # built in project instead of as submodule - shared-modules/glu/glu-9.json
    ########################
    # No Limit Connect
    ########################  
  - name: nolimitconnect
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFLATPAKBUILD=ON

    sources:
      # Local build (acceptable until first Flathub merge)
      - type: dir
        path: ./
      # Then for specific version like
      #- type: archive
      #  url: https://github.com/nolimitconnect/NoLimitConnect/archive/88d20b46b6051c094f6219a0a2ae91b7d0e18eb6.tar.gz
      #  sha256: a96c4ee3d9ee01f61ee7d9960de05a701decf07c0cc189c798ca45540ae2ae38

    post-install:
      # Install the icon to the standard 256x256 location
      - install -Dm644 org.nolimitconnect.NoLimitConnect.png /app/share/icons/hicolor/256x256/apps/org.nolimitconnect.NoLimitConnect.png
      # Install the desktop file as well
      - install -Dm644 org.nolimitconnect.NoLimitConnect.desktop /app/share/applications/org.nolimitconnect.NoLimitConnect.desktop
      # Install metainfo file for appstream
      - install -Dm644 org.nolimitconnect.NoLimitConnect.metainfo.xml /app/share/metainfo/org.nolimitconnect.NoLimitConnect.metainfo.xml





