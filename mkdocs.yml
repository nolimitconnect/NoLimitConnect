extra:
  announce:
    type: warning
    text: >
      🚧 NoLimitConnect is under active development. The application is not yet published — early testers and developers only.

site_name: No Limit Connect
site_url: https://nolimitconnect.org
site_description: Official website for NoLimitConnect — a decentralized, user-hosted social platform.
site_author: NoLimitConnect Project

# ------------------------------------------------------
# Theme Configuration (Material – Dark Only)
# ------------------------------------------------------
theme:
  name: material
  logo: assets/nlc-icon.svg
  favicon: assets/nlc-icon.svg

  palette:
    - scheme: slate
      primary: indigo
      accent: purple

  features:
    - navigation.instant
    - navigation.instant.reload
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
    - announce

# ------------------------------------------------------
# Markdown Extensions
# ------------------------------------------------------
markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - tables
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ------------------------------------------------------
# Directories
# ------------------------------------------------------
docs_dir: docs

