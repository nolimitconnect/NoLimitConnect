variables:
  IMAGE_NAME: brettrjonesdocker/nolimitappimage
  IMAGE_TAG: nlcdevimage-1.0.8 # for Qt 6.9.3 ise nlcdevimage-1.0.8


stages:
#  - build_image
#  - check_for_tagged_commit
  - compile_nlc_for_linux_and_android_os


# dummy pipeline so do not get Checking pipeline status forever when no tag is committed
#run_ci_only_for_tags:
