app-id: com.nolimitconnect.NoLimitConnect

# FlatPak 6.7 works but 6.9 fails

# with Raspberry Pi 5:
# bwrap: execvp appstream-compose: No such file or directory

# with Ubuntu 24.04:
# /usr/lib/gcc/x86_64-unknown-linux-gnu/14.3.0/../../../../x86_64-unknown-linux-gnu/bin/ld: cannot find -lGLU: No such file or directory
# even though modules has
# - shared-modules/glu/glu-9.json

# So build with 6.7 for now

runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk

command: nolimitconnect

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11

  # Audio / Video
  - --socket=pulseaudio
  - --device=dri

  # Network & IPC
  - --share=network
  - --share=ipc

  # Files (user-controlled)
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos

cleanup:
  - '*.a'
  - '*.o'

modules:
    ########################
    # GLU 
    ########################
    # built in project instead of as submodule - shared-modules/glu/glu-9.json
    ########################
    # No Limit Connect
    ########################  
  - name: nolimitconnect
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFLATPAKBUILD=ON

    sources:
      # Local build (acceptable until first Flathub merge)
      - type: dir
        path: ./
      # Then for specific version like
      # - type: git
      #  url: https://gitlab.com/nolimitapps/nolimitconnect.git
      #   commit: de146ed09e9da127c224c50d2ed07672ff2edf46
      #   tag: v1.0.8


