app-id: com.nolimitconnect.NoLimitConnect

# FlatPak 6.9 requires additional installs on Raspberry Pi 5

# with Raspberry Pi 5:
# if you get the error bwrap: execvp appstream-compose: No such file or directory
# then use the following command to install the missing dependency:
# sudo apt install appstream-compose

runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk

command: nolimitconnect

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11

  # Audio / Video
  - --socket=pulseaudio
  - --device=dri

  # Network & IPC
  - --share=network
  - --share=ipc

  # Files (user-controlled)
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos

cleanup:
  - '*.a'
  - '*.o'

modules:
    ########################
    # GLU 
    ########################
    # built in project instead of as submodule - shared-modules/glu/glu-9.json
    ########################
    # No Limit Connect
    ########################  
  - name: nolimitconnect
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFLATPAKBUILD=ON

    sources:
      # Local build (acceptable until first Flathub merge)
      - type: dir
        path: ./
      # Then for specific version like
      # - type: git
      #  url: https://gitlab.com/nolimitcode/nolimitconnect.git
      #   commit: de146ed09e9da127c224c50d2ed07672ff2edf46
      #   tag: v1.0.8


