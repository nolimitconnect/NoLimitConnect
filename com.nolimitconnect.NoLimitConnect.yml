
app-id: com.nolimitconnect.NoLimitConnect
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: nolimitconnect
finish-args: 
    - --device=all
    - --share=ipc
    - --share=network
    - --socket=fallback-x11       
    - --socket=wayland
    - --filesystem=host

modules:
 - shared-modules/glu/glu-9.json

 - name: nolimitconnect
   buildsystem: cmake-ninja
   config-opts: 
    - -DCMAKE_BUILD_TYPE=Release
    - -DFLATPAKBUILD=ON
    
   sources:
     # for local sources so does not do a git pull each time
     - type: dir
       path: ./
       
     #- type: git
     #  url: https://gitlab.com/nolimitconnectapps/nolimitapp.git



